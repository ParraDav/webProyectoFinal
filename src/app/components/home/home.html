<section class="hero">
    <div class="hero-content">
        <h1>Aprende desde cualquier lugar</h1>
        <p>Plataforma de cursos online con Angular, Node.js y MongoDB</p>
        <button class="btn" routerLink="/cursos">Explorar Cursos</button>
    </div>
</section>

<section class="courses">

    <h2 class="section-title">Cursos Destacados</h2>

    <div *ngIf="cargando" class="loading">
        Cargando cursos...
    </div>

    <div *ngIf="!cargando && cursos.length === 0" class="empty">
        No hay cursos disponibles por el momento.
    </div>

    <div class="course-container" *ngIf="!cargando && cursos.length > 0">

        <div class="course-card" *ngFor="let curso of cursos">

            <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4" [alt]="curso.nombre">

            <div class="course-info">

                <h3>{{ curso.nombre }}</h3>

                <p>{{ curso.descripcion }}</p>

                <button class="btn" [routerLink]="['/ver-curso', curso._id]">
                    Ver Curso
                </button>

            </div>

        </div>

    </div>

</section>

<footer>
    <p>© 2026 CursosOnline</p>
</footer>
