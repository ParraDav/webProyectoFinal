<div class="auth-page">

  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-card glass animate-fade-up">

    <!-- Header -->
    <div class="auth-header">
      <div class="brand-mark">◈</div>
      <h1>Bienvenido de vuelta</h1>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" novalidate>

      <!-- Email -->
      <div class="field-group">
        <label for="login-email">Correo electrónico</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="22,4 12,13 2,4"/>
          </svg>
          <input
            id="login-email"
            type="email"
            class="input-field"
            formControlName="email"
            placeholder="tu@correo.com"
            autocomplete="email"
          />
        </div>
        <span class="field-error" *ngIf="email?.invalid && email?.touched">
          <ng-container *ngIf="email?.errors?.['required']">El correo es requerido.</ng-container>
          <ng-container *ngIf="email?.errors?.['email']">Ingresa un correo válido.</ng-container>
        </span>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label for="login-password">Contraseña</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            id="login-password"
            [type]="showPassword ? 'text' : 'password'"
            class="input-field"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button type="button" class="eye-btn" (click)="togglePassword()" tabindex="-1">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="field-error" *ngIf="password?.invalid && password?.touched">
          <ng-container *ngIf="password?.errors?.['required']">La contraseña es requerida.</ng-container>
          <ng-container *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres.</ng-container>
        </span>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary btn-lg submit-btn" [disabled]="loading">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading" class="spinner-wrap">
          <span class="spinner"></span> Verificando...
        </span>
      </button>

    </form>

    <p class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate aquí</a>
    </p>

  </div>
</div>
