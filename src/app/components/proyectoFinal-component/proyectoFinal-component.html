<div>
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
        Registrar 
    </button>
</div>

<div class="table-responsive mt-3">
    <table class="table table-striped table-sm">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Tipo</th>
                <th>Fecha</th>
                <th>Editar</th>
                <th>Eliminar</th>
            </tr>
        </thead>

        <tbody>
            <ng-container *ngFor="let item of animalList">

                <tr>
                    <td>{{ item.nombre }}</td>
                    <td>{{ item.edad }}</td>
                    <td>{{ item.tipo }}</td>
                    <td>{{ item.fecha }}</td>

                    <!-- EDITAR -->
                    <td>
                        <button class="btn btn-primary" (click)="toggleEditAnimal(item._id)">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                    </td>

                    <!-- ELIMINAR -->
                    <td>
                        <button type="button" class="btn btn-danger" (click)="deleteAnimalEntry(item._id)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>

                <!-- FORMULARIO EDITAR -->
                <tr *ngIf="editableAnimal && idAnimal === item._id">
                    <td colspan="6">
                        <form class="card p-3" [formGroup]="animalForm" (ngSubmit)="updateAnimalEntry()">

                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" formControlName="nombre">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Edad</label>
                                <input type="number" class="form-control" formControlName="edad">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo</label>
                                <input type="text" class="form-control" formControlName="tipo">
                            </div>

                            <button type="submit" class="btn btn-success">
                                Guardar cambios
                            </button>
                        </form>
                    </td>
                </tr>

            </ng-container>
        </tbody>
    </table>
</div>

<!-- MODAL -->
<div class="modal fade" id="exampleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h1 class="modal-title fs-5">Nuevo animal</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form [formGroup]="animalForm" (ngSubmit)="newAnimalEntry()">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" formControlName="nombre">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Edad</label>
                        <input type="number" class="form-control" formControlName="edad">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <input type="text" class="form-control" formControlName="tipo">
                    </div>

                    <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">
                        Guardar
                    </button>
                </form>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cerrar
                </button>
            </div>

        </div>
    </div>
</div>
